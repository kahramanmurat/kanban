services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      SESSION_SECRET: ${SESSION_SECRET:-project-management-mvp-dev-secret}
    ports:
      - "8001:8000"
    volumes:
      - ./backend/data:/app/backend/data
